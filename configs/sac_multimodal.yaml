# Multi-modal SAC: visual + state + text description
# Contrastive self-supervised representation for the visual branch

encoders:
  - name: visual_enc
    type: cnn
    input_shape: [3, 64, 64]
    latent_dim: 128
    aux_type: contrastive
    aux_latent_dim: 64
    use_momentum: true
    momentum_tau: 0.99
    layers:
      - [32, 8, 4, relu]
      - [64, 4, 2, relu]
      - [64, 3, 1, relu]

  - name: state_enc
    type: mlp
    input_dim: 18
    latent_dim: 64
    layers:
      - {out_features: 128, activation: relu}
      - {out_features: 64,  activation: relu}

  - name: lang_enc
    type: text
    latent_dim: 64

flows:
  - "visual_enc -> actor"
  - "state_enc  -> actor"
  - "lang_enc   -> actor"
  - "visual_enc -> critic"
  - "state_enc  -> critic"

actor:
  name: actor
  type: squashed_gaussian
  action_dim: 6
  layers: [{out_features: 256, activation: relu}]
  log_std_min: -5.0
  log_std_max: 2.0

critic:
  name: critic
  type: twin_q
  action_dim: 6
  layers: [{out_features: 256, activation: relu}]

losses:
  - name: sac_q
    weight: 1.0
  - name: sac_policy
    weight: 1.0
  - name: contrastive
    weight: 0.5

ros2:
  obs_topics:
    visual_enc: /camera/image_raw
    state_enc:  /robot/joint_states
    lang_enc:   /task/description
  action_topic: /robot/cmd_vel
