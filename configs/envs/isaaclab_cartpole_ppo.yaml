# PPO on Isaac Lab — Isaac-Cartpole-v0  (obs=4, act=1)
# Requires IsaacLab + IsaacSim
# Target return: ~400 (convergence ~500k steps)

env_id: "Isaac-Cartpole-v0"
env_type: "isaaclab"

algo: ppo

encoders:
  - name: actor_state_enc
    type: mlp
    input_dim: 4
    latent_dim: 64
    layers:
      - {out_features: 64, activation: elu, norm: none}
      - {out_features: 64, activation: elu, norm: none}
  - name: critic_state_enc
    type: mlp
    input_dim: 4
    latent_dim: 64
    layers:
      - {out_features: 64, activation: elu, norm: none}
      - {out_features: 64, activation: elu, norm: none}

flows:
  - "actor_state_enc -> actor"
  - "critic_state_enc -> critic"

actor:
  name: actor
  type: gaussian
  action_dim: 1
  log_std_init: -1.0
  layers:
    - {out_features: 64, activation: elu, norm: none}

critic:
  name: critic
  type: value
  layers:
    - {out_features: 64, activation: elu, norm: none}

losses:
  - {name: policy,  weight: 1.0}
  - {name: value,   weight: 1.0}
  - {name: entropy, weight: 0.01}

train:
  total_steps: 500_000
  n_envs: 512
  n_steps: 16
  batch_size: 8192
  n_epochs: 5
  lr: 5e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  entropy_coef: 0.01
  vf_coef: 1.0
  max_grad_norm: 1.0
