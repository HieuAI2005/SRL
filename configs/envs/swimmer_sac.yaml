# SAC on Swimmer-v5  (obs=8, act=2)
# Target return: ~300 (convergence ~500k steps)

env_id: "Swimmer-v5"
env_type: "flat"

algo: sac

encoders:
  - name: actor_state_enc
    input_name: state
    type: mlp
    input_dim: 8
    latent_dim: 256
    layers:
      - {out_features: 256, activation: relu, norm: layer_norm}
      - {out_features: 256, activation: relu, norm: layer_norm}
  - name: critic_state_enc
    input_name: state
    type: mlp
    input_dim: 8
    latent_dim: 256
    layers:
      - {out_features: 256, activation: relu, norm: layer_norm}
      - {out_features: 256, activation: relu, norm: layer_norm}

flows:
  - "actor_state_enc -> actor"
  - "critic_state_enc -> critic"

actor:
  name: actor
  type: squashed_gaussian
  action_dim: 2
  log_std_min: -5.0
  log_std_max: 2.0
  layers:
    - {out_features: 256, activation: relu, norm: layer_norm}

critic:
  name: critic
  type: twin_q
  action_dim: 2
  layers:
    - {out_features: 256, activation: relu, norm: layer_norm}

losses:
  - {name: sac_q,           weight: 1.0}
  - {name: sac_policy,      weight: 1.0}
  - {name: sac_temperature, weight: 1.0}

train:
  total_steps: 500_000
  lr_actor: 3e-4
  lr_critic: 3e-4
  lr_alpha: 3e-4
  buffer_size: 1_000_000
  batch_size: 256
  gamma: 0.9999
  tau: 0.005
  learning_starts: 5_000
  train_freq: 1
  gradient_steps: 1
