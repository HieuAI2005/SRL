# PPO on Isaac Lab — Isaac-Humanoid-v0  (obs=87, act=21)
# Requires IsaacLab + IsaacSim
# Target return: ~5000 (convergence ~10M steps)

env_id: "Isaac-Humanoid-v0"
env_type: "isaaclab"

algo: ppo

encoders:
  - name: actor_state_enc
    type: mlp
    input_dim: 87
    latent_dim: 512
    layers:
      - {out_features: 512, activation: elu, norm: none}
      - {out_features: 256, activation: elu, norm: none}
      - {out_features: 128, activation: elu, norm: none}
  - name: critic_state_enc
    type: mlp
    input_dim: 87
    latent_dim: 512
    layers:
      - {out_features: 512, activation: elu, norm: none}
      - {out_features: 256, activation: elu, norm: none}
      - {out_features: 128, activation: elu, norm: none}

flows:
  - "actor_state_enc -> actor"
  - "critic_state_enc -> critic"

actor:
  name: actor
  type: gaussian
  action_dim: 21
  log_std_init: -1.0
  layers:
    - {out_features: 128, activation: elu, norm: none}

critic:
  name: critic
  type: value
  layers:
    - {out_features: 128, activation: elu, norm: none}

losses:
  - {name: policy,  weight: 1.0}
  - {name: value,   weight: 1.0}
  - {name: entropy, weight: 0.0}

train:
  total_steps: 10_000_000
  n_envs: 4096
  n_steps: 32
  batch_size: 16384
  n_epochs: 5
  lr: 5e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  entropy_coef: 0.0
  vf_coef: 1.0
  max_grad_norm: 1.0
